<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignIn - Cookify</title>
    
    <!-- Firebase SDK:er -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        // Notera: signInWithEmailAndPassword är det korrekta namnet för funktionen
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // --- DIN KONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyDoZw3wyacfcEH-vCj4hg_ixuDaUVLBQ50",
            authDomain: "cookify-704ff.firebaseapp.com",
            projectId: "cookify-704ff",
            storageBucket: "cookify-704ff.firebasestorage.app",
            messagingSenderId: "523502349982",
            appId: "1:523502349982:web:c1b502e261fc5ce8b6958f",
            measurementId: "G-GXCN019ZXX"
        };

        // Initiera Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        // Hantera statusändringar (skicka till dashboard vid inloggning)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Användaren är inloggad, skicka till dashboard
                console.log("Inloggad som:", user.email);
                // window.location.href = 'dashboard.html'; // Aktivera när dashboard.html finns
            }
        });

        // Gör funktionerna tillgängliga för knapparna i HTML-delen
        window.authActions = { auth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, googleProvider };
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4fc3f7;
            --primary-dark: #03a9f4;
            --white: #ffffff;
            --glass: rgba(15, 23, 42, 0.4);
            --text-dark: #ffffff;
            --text-light: rgba(255, 255, 255, 0.75);
            --radius-lg: 32px;
            --radius-md: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #050a15;
            position: relative;
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background-image: url('https://images.unsplash.com/photo-1499636136210-6f4ee915583e?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            filter: brightness(0.35) saturate(1.1);
            z-index: -2;
        }

        .auth-card {
            background: var(--glass);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            width: 100%;
            max-width: 440px;
            padding: 50px 40px;
            border-radius: var(--radius-lg);
            box-shadow: 0 40px 100px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.1);
            text-align: center;
        }

        .logo-box h1 {
            font-family: 'Instrument Serif', serif;
            font-size: 3.5rem;
            color: var(--primary);
            font-style: italic;
            margin-bottom: 5px;
        }

        .page-title {
            color: var(--white);
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 25px;
            opacity: 0.9;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 16px 20px;
            border-radius: var(--radius-md);
            color: var(--white);
            margin-bottom: 15px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(79, 195, 247, 0.2);
        }

        .btn-primary {
            width: 100%;
            background: var(--primary);
            color: #0a0f1d;
            border: none;
            padding: 18px;
            border-radius: var(--radius-md);
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1rem;
            margin-top: 10px;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .btn-google {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            color: var(--white);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 14px;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-google:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 25px 0;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8rem;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .divider:not(:empty)::before { margin-right: 15px; }
        .divider:not(:empty)::after { margin-left: 15px; }

        #notif-toast {
            position: fixed;
            top: 30px;
            padding: 15px 30px;
            border-radius: 50px;
            display: none;
            background: rgba(255, 152, 0, 0.9);
            color: white;
            z-index: 100;
            font-size: 0.9rem;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

    <div class="hero-bg"></div>
    <div id="notif-toast"></div>

    <div class="auth-card">
        <div class="logo-box">
            <h1>Cookify</h1>
        </div>
        
        <h2 id="page-title" class="page-title">Välkommen tillbaka</h2>

        <form id="auth-form">
            <input type="email" id="email" placeholder="Din e-post" required>
            <input type="password" id="password" placeholder="Ditt lösenord" required>
            <button type="submit" class="btn-primary" id="submit-btn">
                <span id="btn-text">Öppna köket</span>
            </button>
        </form>

        <div class="divider">eller fortsätt med</div>

        <button type="button" class="btn-google" id="google-btn">
            <svg width="20" height="20" viewBox="0 0 24 24">
                <path fill="currentColor" d="M21.35,11.1H12.18V13.83H18.69C18.36,17.64 15.19,19.27 12.19,19.27C8.36,19.27 5,16.25 5,12C5,7.9 8.2,4.73 12.2,4.73C15.29,4.73 17.1,6.73 17.1,6.73L19.05,4.51C19.05,4.51 16.66,2.1 12.1,2.1C6.74,2.1 2.22,6.5 2.22,12C2.22,17.5 6.74,21.9 12.1,21.9C17.5,21.9 21.5,17.44 21.5,12C21.5,11.45 21.35,11.1 21.35,11.1V11.1Z" />
            </svg>
            Google
        </button>

        <div style="margin-top: 30px; color: white; font-size: 0.9rem;">
            <p id="switch-text">Ny här? <span id="toggle-link" style="color: var(--primary); cursor: pointer; font-weight: 600;">Skapa konto</span></p>
        </div>
    </div>

    <script>
        const authForm = document.getElementById('auth-form');
        const emailField = document.getElementById('email');
        const passField = document.getElementById('password');
        const toggleLink = document.getElementById('toggle-link');
        const submitBtn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');
        const pageTitle = document.getElementById('page-title');
        const googleBtn = document.getElementById('google-btn');
        const toast = document.getElementById('notif-toast');

        let isLogin = true;

        function showStatus(message) {
            toast.textContent = message;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 4000);
        }

        // Växla mellan Logga in och Skapa konto
        toggleLink.addEventListener('click', () => {
            isLogin = !isLogin;
            pageTitle.textContent = isLogin ? 'Välkommen tillbaka' : 'Skapa konto';
            btnText.textContent = isLogin ? 'Öppna köket' : 'Börja baka';
            toggleLink.textContent = isLogin ? 'Skapa konto' : 'Logga in';
            document.getElementById('switch-text').firstChild.textContent = isLogin ? 'Ny här? ' : 'Redan kock? ';
        });

        // Google Inloggning
        googleBtn.addEventListener('click', async () => {
            if (!window.authActions) return;
            const { auth, signInWithPopup, googleProvider } = window.authActions;
            try {
                const result = await signInWithPopup(auth, googleProvider);
                showStatus("Välkommen " + result.user.displayName + "!");
            } catch (err) {
                showStatus("Hoppsan! Google säger: " + err.message);
            }
        });

        // E-post Inloggning/Registrering
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!window.authActions) return;
            const { auth, signInWithEmailAndPassword, createUserWithEmailAndPassword } = window.authActions;

            const email = emailField.value;
            const password = passField.value;

            submitBtn.disabled = true;
            btnText.textContent = "Väntar...";

            try {
                if (isLogin) {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    await createUserWithEmailAndPassword(auth, email, password);
                    showStatus("Välkommen! Nu är ditt konto klart.");
                }
            } catch (err) {
                let msg = err.message;
                if (err.code === 'auth/invalid-credential') msg = "Fel e-post eller lösenord.";
                if (err.code === 'auth/email-already-in-use') msg = "E-posten används redan.";
                if (err.code === 'auth/weak-password') msg = "Lösenordet måste vara minst 6 tecken.";
                
                showStatus(msg);
                submitBtn.disabled = false;
                btnText.textContent = isLogin ? 'Öppna köket' : 'Börja baka';
            }
        });
    </script>
</body>
</html>
